name: Weekly digest

# Sends the Munshot weekly brief on the schedule chosen in the app (day · time ·
# timezone). Cloudflare Pages can't run cron itself, and a YAML cron is a fixed UTC
# string — so this workflow PINGS the deployed /api/cron/weekly-digest endpoint
# every 30 minutes, and the endpoint decides whether it's the chosen send time
# (de-duped to once per week). A manual run forces an immediate send.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SITE_URL     — the deployed site origin, e.g. https://podcast.pages.dev
#   CRON_SECRET  — the same value bound as the CRON_SECRET env var on the Pages
#                  project (Settings → Functions/Variables). Guards the endpoint.
#
# The Pages project ALSO needs MUNSHOT_EMAIL_TOKEN set (a service token for the
# raw-email endpoint) — a cron has no user session to authenticate the send with.

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 min; the endpoint gates on the chosen schedule
  workflow_dispatch: {} # a manual run forces an immediate send (see ?force=1 below)

# Don't let two runs overlap (e.g. a manual run during the scheduled one).
concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the weekly digest
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::SITE_URL and CRON_SECRET repository secrets must be set."
            exit 1
          fi
          # A manual run forces an immediate send; the scheduled ticks let the
          # endpoint decide based on the app's chosen day/time/timezone.
          url="${SITE_URL%/}/api/cron/weekly-digest"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then url="${url}?force=1"; fi
          # Generous timeout: a tick may summarise a bounded batch of pending episodes
          # before (maybe) sending, so allow well beyond a bare send.
          code=$(curl -sS -o /tmp/digest.json -w '%{http_code}' \
            -X POST "$url" \
            -H "authorization: Bearer ${CRON_SECRET}" \
            --max-time 280)
          echo "HTTP ${code}"
          cat /tmp/digest.json || true
          echo
          # Surface a non-2xx as a failed run so the schedule is visibly broken if it breaks.
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "::error::weekly-digest endpoint returned HTTP ${code}"
            exit 1
          fi
